version: '3.3'

services:
  cli:
    image: ubuntu:22.04
    command: ["sleep", "3600"]   # keep container alive
    secrets:
      - source: test_credentials
        target: /root/.aws/credentials   # secret mounted directly to ~/.aws/credentials
        uid: '0'       # root user owns the file
        gid: '0'       # root group owns the file
        mode: 0440     # read-only for root
    deploy:
      replicas: 1
      placement:
        constraints: [node.role != manager]
      resources:
        reservations:
          memory: 128M
        limits:
          memory: 512M
    environment:
      AWS_DEFAULT_REGION: us-east-1
    networks:
      - test

secrets:
  test_credentials:
    external: true

networks:
  test:
