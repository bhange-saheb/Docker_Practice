version: '3.8'

services:
  db:
    image: mysql:8.0
    user: "999:999"   # run MySQL as non-root (mysql user inside image)
    secrets:
      - source: db_root_password
        target: db_root_password
        uid: '999'
        gid: '999'
        mode: 0440
      - source: db_dba_password
        target: db_dba_password
        uid: '999'
        gid: '999'
        mode: 0440
    deploy:
      replicas: 1
      placement:
        constraints: [node.role == manager]
      resources:
        reservations:
          memory: 128M
          cpus: '0.25'
        limits:
          memory: 512M
          cpus: '1'
    ports:
      - 3306:3306
    environment:
      MYSQL_USER: dba
      MYSQL_DATABASE: mydb
      MYSQL_ROOT_PASSWORD_FILE: /run/secrets/db_root_password
      MYSQL_PASSWORD_FILE: /run/secrets/db_dba_password
    networks:
      - appnet
    volumes:
      - datavol:/var/lib/mysql

  adminer:
    image: adminer
    user: "1000:1000"   # run Adminer as non-root
    ports:
      - 8888:8080
    networks:
      - appnet

  utils:
    image: kiran2361993/troubleshootingtools:v1
    user: "1000:1000"   # run utils as non-root
    deploy:
      replicas: 1
      placement:
        constraints: [node.role != manager]
    networks:
      - appnet

secrets:
  db_root_password:
    external: true
  db_dba_password:
    external: true

networks:
  appnet:
    external: true

volumes:
  datavol:
